name: Check moto test slots

on:
  schedule:
    # Every 3h from 08:00–20:00 Asia/Taipei (UTC+8) → 00,03,06,09,12 UTC.
    - cron: "0 0,3,6,9,12 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Chromium
        run: playwright install --with-deps chromium

      - name: Run scrape
        id: scrape
        run: |
          python check_moto_test.py | tee scrape-output.txt
          if grep -q "^Upcoming motorcycle road-test slots" scrape-output.txt; then
            echo "has_slots=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Email results
        if: steps.scrape.outputs.has_slots == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          from: tw-moto-scrape <${{ secrets.MAIL_USERNAME }}>
          to: andrewjshum@gmail.com
          subject: "Motorcycle road-test slots available — Taipei / New Taipei"
          body: file://scrape-output.txt
          convert_markdown: false
