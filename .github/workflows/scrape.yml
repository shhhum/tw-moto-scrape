name: Check moto test slots

on:
  schedule:
    # Every 3h from 08:00–20:00 Asia/Taipei (UTC+8) → 00,03,06,09,12 UTC.
    - cron: "0 0,3,6,9,12 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Chromium
        run: playwright install --with-deps chromium

      - name: Run scrape
        run: python check_moto_test.py
